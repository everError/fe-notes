# IDE 앱 (80 포트)
server {
    listen 80;
    server_name localhost;

    location / {
        root   /usr/share/nginx/html/ide;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }
}

# Canvas 앱 (5174 포트)
server {
    listen 5174;
    server_name localhost;

    location / {
        root   /usr/share/nginx/html/canvas-app;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
        
        # IDE에서 iframe으로 호출하므로 CORS 및 보안 설정 추가
        add_header 'Access-Control-Allow-Origin' '*';
    }
}